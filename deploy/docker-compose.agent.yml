# ipcap agent — runs ON THE VULNBOX as a compose stack (replaces the systemd
# units). Three single-purpose services share one image (ipcap + eCapture baked
# in). They are host-privileged by necessity: capture needs the host NIC, the
# listener binds the host drain port, and the TLS hooker needs host eBPF + host
# pid + host cgroup visibility to reach every vulnservice's libssl — none of
# which reduces isolation (the agent is root-level either way).
#
# The spool lives in a docker NAMED VOLUME: it survives every container restart,
# crash, and `compose up --build`, so on a restart/redeploy capture resumes the
# same gpidx space (recovery reads the existing segments) and the collector
# resumes exactly-once — no gap, no reset. It is wiped only by an explicit
# `compose down -v`; even then it self-heals (the agent stamps the spool with an
# epoch and the collector realigns its commit point when the epoch changes).
#
# The keylog (TLS keys) lives in a HOST BIND DIRECTORY (IPCAP_KEYLOG_DIR, default
# /var/lib/ipcap/keylog) — unlike the spool, the operator needs to write here: a
# MANUAL FALLBACK if eCapture can't hook a service. Drop any NSS keylog file
# (`<dir>/manual-*.log`, from mitmproxy, an SSLKEYLOGFILE env, a custom setup, …)
# and the listener relays it to the collector — even with the TLS hooker disabled
# (the listener tails the directory, not just eCapture's output). See ECAPTURE.md.
#
# Required: ./agent.key (this vulnbox's private key) and IPCAP_COLLECTOR_PUB (the
# collector's public key). Optional: ./tls_targets.yml (TLS override), IPCAP_IFACE
# (capture interface, default game), IPCAP_KEYLOG_DIR (host keylog dir).
services:
  ipcap-capture:
    image: ghcr.io/madrhacks/ipcap-agent:${IPCAP_IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile.agent
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    command:
      - agent
      - capture
      - --iface=${IPCAP_IFACE:-game}
      - --spool-dir=/spool
      - --src-id=1
      - --exclude-port=7878
      - --ring-mib=256
    volumes:
      - ipcap-spool:/spool

  ipcap-listen:
    image: ghcr.io/madrhacks/ipcap-agent:${IPCAP_IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile.agent
    restart: unless-stopped
    network_mode: host
    command:
      - agent
      - listen
      - --spool-dir=/spool
      - --src-id=1
      - --listen=:7878
      - --key=/keys/agent.key
      - --peer=${IPCAP_COLLECTOR_PUB:?set IPCAP_COLLECTOR_PUB to the collector public key}
      # A DIRECTORY: relays eCapture's output AND any manual *.log dropped in here.
      - --keylog-file=/keylog
    volumes:
      - ipcap-spool:/spool
      - ./agent.key:/keys/agent.key:ro
      - ${IPCAP_KEYLOG_DIR:-/var/lib/ipcap/keylog}:/keylog
    depends_on:
      - ipcap-capture

  # TLS keylog: auto-hooks vulnservice containers with eCapture. Privileged +
  # pid:host + cgroup:host so eBPF uprobes reach every container's libssl AND the
  # host cgroup paths resolve correctly for per-container filtering (without
  # cgroup:host the container's private cgroup namespace mistranslates the paths
  # and the filter breaks). An eBPF fault here is isolated to this container and
  # never touches capture or a vulnservice.
  ipcap-tls:
    image: ghcr.io/madrhacks/ipcap-agent:${IPCAP_IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile.agent
    restart: unless-stopped
    privileged: true
    pid: host
    cgroup: host
    command:
      - agent
      - tls
      - --ecapture-bin=/usr/local/bin/ecapture
      # eCapture's merged output lands in the keylog dir the listener tails,
      # alongside any manual *.log the operator drops there.
      - --keylog-file=/keylog/ecapture.log
      - --keylog-dir=/keylog/targets
      - --config=/config/tls_targets.yml
      - --interval=10s
    volumes:
      - ${IPCAP_KEYLOG_DIR:-/var/lib/ipcap/keylog}:/keylog
      - ./tls_targets.yml:/config/tls_targets.yml:ro
      - /sys:/sys:ro
    depends_on:
      - ipcap-listen

volumes:
  ipcap-spool:
